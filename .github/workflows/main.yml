name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Увеличение тайм-аута на 30 минут для всего job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      # Шаги для каждого пакета
      - name: Lint and Build for common package
        run: |
          cd packages/common
          npm run lint
          npm run build

      - name: Publish common to npm
        run: |
          cd packages/common
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GH_NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_TOKEN }}

      - name: Lint and Build for forms package
        run: |
          cd packages/forms
          npm run lint
          npm run build

      - name: Publish forms to npm
        run: |
          cd packages/forms
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GH_NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_TOKEN }}

      - name: Lint and Build for product package
        run: |
          cd packages/product
          npm run lint
          npm run build

      - name: Publish product to npm
        run: |
          cd packages/product
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GH_NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_TOKEN }}

  storybook:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Увеличение тайм-аута для деплоя

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy Storybook to GitHub Pages
        if: github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_NPM_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: gh-pages
          keep_files: true
        timeout-minutes: 20  # Тайм-аут для деплоя Storybook
