name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: [common, forms, product]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Check if package changed
        id: check_changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "packages/${{ matrix.package }}/"; then
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "package_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Linter
        if: steps.check_changes.outputs.package_changed == 'true'
        run: |
          cd packages/${{ matrix.package }}
          npm run lint

      - name: Run Tests
        if: steps.check_changes.outputs.package_changed == 'true'
        run: |
          cd packages/${{ matrix.package }}
          npm run test

      - name: Build Library
        if: steps.check_changes.outputs.package_changed == 'true'
        run: |
          cd packages/${{ matrix.package }}
          npm run build

      - name: Publish Package
        if: steps.check_changes.outputs.package_changed == 'true' && github.ref == 'refs/heads/develop'
        run: |
          cd packages/${{ matrix.package }}
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GH_NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_TOKEN }}

  storybook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy Storybook to GitHub Pages
        if: github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_NPM_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: gh-pages
          keep_files: true
