name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package:
          - common
          - forms
          - product

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Check if package changed
        id: check_changes
        run: |
          PACKAGE_CHANGED=false
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "packages/${{ matrix.package }}/"; then
            PACKAGE_CHANGED=true
          fi
          echo "PACKAGE_CHANGED=${PACKAGE_CHANGED}"
          echo "::set-output name=package_changed::${PACKAGE_CHANGED}"

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Library
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

      - name: Run Lighthouse CI
        run: |
          npm run lhci || echo "Lighthouse CI failed, but continuing pipeline..."

      - name: Deploy Storybook to GitHub Pages
        if: github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_NPM_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: gh-pages
          keep_files: true

      - name: Publish Package
        if: ${{ steps.check_changes.outputs.package_changed == 'true' }}
        run: |
          cd packages/${{ matrix.package }}
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GH_NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_TOKEN }}
