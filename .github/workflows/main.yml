name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: [common, forms, product]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          registry-url: 'https://npm.pkg.github.com'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🔍 Lint
        run: |
          cd packages/${{ matrix.package }}
          echo "🔍 Running lint for ${{ matrix.package }}"
          npm run lint

      - name: 🧪 Run Tests
        run: |
          cd packages/${{ matrix.package }}
          echo "🧪 Running tests for ${{ matrix.package }}"
          npm run test

      - name: 🏗 Build Package
        run: |
          cd packages/${{ matrix.package }}
          echo "🏗 Building ${{ matrix.package }}"
          npm run build

      - name: 🚀 Publish to GitHub Packages
        if: github.ref == 'refs/heads/develop'
        run: |
          cd packages/${{ matrix.package }}
          echo "🚀 Publishing ${{ matrix.package }}"
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GH_NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_TOKEN }}

  storybook:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏗 Build Storybook
        run: npm run build-storybook

      - name: 🌍 Deploy Storybook to GitHub Pages
        if: github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_NPM_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: gh-pages
          keep_files: true
