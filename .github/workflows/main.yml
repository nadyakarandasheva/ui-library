name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Увеличение тайм-аута на 30 минут для всего job

    strategy:
      matrix:
        package: [common, forms, product]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: |
          cd packages/${{ matrix.package }}
          npm run lint
        timeout-minutes: 10  # Тайм-аут на выполнение линтинга (можно уменьшить/увеличить)

      - name: Test
        run: |
          cd packages/${{ matrix.package }}
          npm run test
        timeout-minutes: 10  # Тайм-аут на выполнение тестов (можно уменьшить/увеличить)

      - name: Build
        run: |
          cd packages/${{ matrix.package }}
          npm run build
        timeout-minutes: 20  # Тайм-аут на выполнение сборки (можно уменьшить/увеличить)

      - name: Publish to npm
        run: |
          cd packages/${{ matrix.package }}
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GH_NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_TOKEN }}
        timeout-minutes: 10  # Тайм-аут для публикации в NPM

  storybook:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Увеличение тайм-аута для деплоя

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy Storybook to GitHub Pages
        if: github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_NPM_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: gh-pages
          keep_files: true
        timeout-minutes: 20  # Тайм-аут для деплоя Storybook
